<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Preview — Some Odd Road</title>
    <style>
        /* ── Design Tokens ── */
        :root {
            --bg: #FAF7F2;
            --bg-warm: #F3EDE4;
            --text: #2C2825;
            --text-secondary: #6B6560;
            --text-muted: #9E9790;
            --accent: #C4572A;
            --accent-hover: #A8441E;
            --border: #E5DFD6;
            --border-light: #EDE8E0;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
        }

        body {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Toolbar ── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--bg-warm);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .toolbar-title {
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--text);
            white-space: nowrap;
        }

        .toolbar-title-muted {
            color: var(--text-muted);
            font-weight: 400;
            margin-left: 0.5rem;
        }

        .design-tabs {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
            flex-wrap: wrap;
        }

        .tab-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tab-group-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            padding-right: 0.25rem;
        }

        .tab-group.review .tab-group-label {
            color: var(--accent);
        }

        .tab-group-divider {
            width: 1px;
            height: 22px;
            background: var(--border);
        }

        .tab-buttons {
            display: flex;
            gap: 0.25rem;
        }

        .tab-button {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .tab-button:hover {
            background: var(--bg);
            border-color: var(--border);
        }

        .tab-button.active {
            color: #fff;
            background: var(--accent);
            border-color: var(--accent);
        }

        .tab-button.archived {
            padding: 0.35rem 0.6rem;
            font-size: 12px;
            font-weight: 400;
            color: var(--text-muted);
            opacity: 0.7;
        }

        .tab-button.archived:hover {
            opacity: 1;
            color: var(--text-secondary);
            background: var(--bg);
            border-color: var(--border-light);
        }

        .tab-button.archived.active {
            opacity: 1;
            color: #fff;
            background: var(--text-secondary);
            border-color: var(--text-secondary);
        }

        .toolbar-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .action-button {
            padding: 0.5rem 0.875rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: var(--sans);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            transition: all 0.15s ease;
        }

        .action-button:hover {
            color: var(--text);
            border-color: var(--text-muted);
            background: var(--bg);
        }

        .action-button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .action-button.primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        /* ── Viewport ── */
        .viewport {
            flex: 1;
            position: relative;
            background: var(--bg);
            overflow: hidden;
        }

        .viewport-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: var(--bg);
        }

        @media (max-width: 720px) {
            .toolbar {
                padding: 0.625rem 0.875rem;
                gap: 0.75rem;
                flex-wrap: wrap;
            }

            .toolbar-title-muted { display: none; }

            .design-tabs {
                order: 3;
                width: 100%;
                overflow-x: auto;
                flex-wrap: nowrap;
            }

            .tab-group-divider { display: none; }

            .tab-button {
                padding: 0.4rem 0.75rem;
                font-size: 12px;
                white-space: nowrap;
            }

            .action-button {
                padding: 0.4rem 0.625rem;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <header class="toolbar">
        <div class="toolbar-title">
            Design Preview
            <span class="toolbar-title-muted">Some Odd Road</span>
        </div>

        <nav class="design-tabs" id="designTabs">
            <div class="tab-group review">
                <span class="tab-group-label">For review</span>
                <div class="tab-buttons">
                    <button class="tab-button" data-file="v6.html">v6</button>
                    <button class="tab-button" data-file="v6.1.html">v6.1</button>
                    <button class="tab-button" data-file="v6.2.html">v6.2</button>
                    <button class="tab-button" data-file="v6.3.html">v6.3</button>
                    <button class="tab-button active" data-file="v6.4.html">v6.4</button>
                </div>
            </div>

            <div class="tab-group-divider"></div>

            <div class="tab-group">
                <span class="tab-group-label">Archive</span>
                <div class="tab-buttons">
                    <button class="tab-button archived" data-file="test.html" title="Archived">v1</button>
                    <button class="tab-button archived" data-file="v2.html" title="Archived">v2</button>
                    <button class="tab-button archived" data-file="v3.html" title="Archived">v3</button>
                    <button class="tab-button archived" data-file="v4.html" title="Archived">v4</button>
                    <button class="tab-button archived" data-file="v5.html" title="Archived">v5</button>
                    <button class="tab-button archived" data-file="v7.html" title="Archived">v7</button>
                    <button class="tab-button archived" data-file="v8.html" title="Archived">v8</button>
                    <button class="tab-button archived" data-file="v9.html" title="Archived">v9</button>
                    <button class="tab-button archived" data-file="v10.html" title="Archived">v10</button>
                </div>
            </div>
        </nav>

        <div class="toolbar-actions">
            <a class="action-button" id="openNewTab" href="v6.4.html" target="_blank" rel="noopener">Open in new tab</a>
            <button class="action-button primary" id="reloadFrame" type="button">Reload</button>
        </div>
    </header>

    <main class="viewport">
        <iframe
            id="viewportFrame"
            class="viewport-frame"
            src="v6.4.html"
            title="Design preview"></iframe>
    </main>

    <script>
        const tabsContainer = document.getElementById('designTabs');
        const tabButtons = tabsContainer.querySelectorAll('.tab-button');
        const viewportFrame = document.getElementById('viewportFrame');
        const openNewTab = document.getElementById('openNewTab');
        const reloadFrame = document.getElementById('reloadFrame');

        function loadDesign(file) {
            if (!file) return;
            viewportFrame.src = file;
            openNewTab.href = file;
            tabButtons.forEach(function (btn) {
                btn.classList.toggle('active', btn.dataset.file === file);
            });
            if (window.location.hash.replace('#', '') !== file) {
                history.replaceState(null, '', '#' + file);
            }
        }

        tabButtons.forEach(function (btn) {
            btn.addEventListener('click', function () {
                loadDesign(btn.dataset.file);
            });
        });

        reloadFrame.addEventListener('click', function () {
            const currentSrc = viewportFrame.getAttribute('src');
            if (currentSrc) viewportFrame.src = currentSrc;
        });

        // Number keys 1–N cycle through review designs first, then archive
        document.addEventListener('keydown', function (event) {
            if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;
            const keyIndex = parseInt(event.key, 10);
            if (!isNaN(keyIndex) && keyIndex >= 1 && keyIndex <= tabButtons.length) {
                const targetButton = tabButtons[keyIndex - 1];
                if (targetButton) loadDesign(targetButton.dataset.file);
            }
        });

        (function init() {
            const hashFile = window.location.hash.replace('#', '');
            const validFiles = Array.from(tabButtons).map(function (btn) {
                return btn.dataset.file;
            });
            if (hashFile && validFiles.indexOf(hashFile) !== -1) {
                loadDesign(hashFile);
            }
        })();
    </script>
</body>

</html>
