<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Preview — Some Odd Road</title>
    <style>
        /* ── Design Tokens ── */
        :root {
            --bg: #FAF7F2;
            --bg-warm: #F3EDE4;
            --text: #2C2825;
            --text-secondary: #6B6560;
            --text-muted: #9E9790;
            --accent: #C4572A;
            --accent-hover: #A8441E;
            --border: #E5DFD6;
            --border-light: #EDE8E0;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* ── Reset & Base ── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            font-size: 14px;
        }

        body {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Toolbar ── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--bg-warm);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .toolbar-title {
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--text);
            white-space: nowrap;
        }

        .toolbar-title-muted {
            color: var(--text-muted);
            font-weight: 400;
            margin-left: 0.5rem;
        }

        .design-tabs {
            display: flex;
            gap: 0.25rem;
            flex: 1;
        }

        .tab-button {
            padding: 0.5rem 1rem;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 400;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .tab-button:hover {
            color: var(--text);
            background: var(--bg);
        }

        .tab-button.active {
            color: var(--accent);
            background: var(--bg);
            border-color: var(--border);
            font-weight: 500;
        }

        .tab-button.archived {
            opacity: 0.42;
            font-style: italic;
            color: var(--text-muted);
        }

        .tab-button.archived::before {
            content: '~ ';
            opacity: 0.7;
        }

        .tab-button.archived:hover {
            opacity: 0.85;
            font-style: italic;
            color: var(--text-secondary);
        }

        .tab-button.archived.active {
            opacity: 1;
            font-style: italic;
            color: var(--accent);
        }

        .toolbar-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .action-button {
            padding: 0.5rem 0.875rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-family: var(--sans);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            transition: all 0.15s ease;
        }

        .action-button:hover {
            color: var(--text);
            border-color: var(--text-muted);
            background: var(--bg);
        }

        .action-button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .action-button.primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        /* ── Viewport ── */
        .viewport {
            flex: 1;
            position: relative;
            background: var(--bg);
            overflow: hidden;
        }

        .viewport-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: var(--bg);
        }

        /* ── Responsive ── */
        @media (max-width: 720px) {
            .toolbar {
                padding: 0.625rem 0.875rem;
                gap: 0.75rem;
                flex-wrap: wrap;
            }

            .toolbar-title-muted {
                display: none;
            }

            .design-tabs {
                order: 3;
                width: 100%;
                overflow-x: auto;
            }

            .tab-button {
                padding: 0.4rem 0.75rem;
                font-size: 12px;
                white-space: nowrap;
            }

            .action-button {
                padding: 0.4rem 0.625rem;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <header class="toolbar">
        <div class="toolbar-title">
            Design Preview
            <span class="toolbar-title-muted">Some Odd Road</span>
        </div>

        <nav class="design-tabs" id="designTabs">
            <button class="tab-button archived active" data-file="test.html" title="Archived">v1</button>
            <button class="tab-button archived" data-file="v2.html" title="Archived">v2</button>
            <button class="tab-button archived" data-file="v3.html" title="Archived">v3</button>
            <button class="tab-button archived" data-file="v4.html" title="Archived">v4</button>
            <button class="tab-button archived" data-file="v5.html" title="Archived">v5</button>
            <button class="tab-button" data-file="v6.html">v6</button>
            <button class="tab-button" data-file="v6.1.html">v6.1</button>
            <button class="tab-button" data-file="v6.2.html">v6.2</button>
            <button class="tab-button" data-file="v6.3.html">v6.3</button>
            <button class="tab-button" data-file="v6.4.html">v6.4</button>
            <button class="tab-button archived" data-file="v7.html" title="Archived">v7</button>
            <button class="tab-button archived" data-file="v8.html" title="Archived">v8</button>
            <button class="tab-button archived" data-file="v9.html" title="Archived">v9</button>
            <button class="tab-button archived" data-file="v10.html" title="Archived">v10</button>
        </nav>

        <div class="toolbar-actions">
            <a class="action-button" id="openNewTab" href="test.html" target="_blank" rel="noopener">Open in new tab</a>
            <button class="action-button primary" id="reloadFrame" type="button">Reload</button>
        </div>
    </header>

    <main class="viewport">
        <iframe
            id="viewportFrame"
            class="viewport-frame"
            src="test.html"
            title="Design preview"></iframe>
    </main>

    <script>
        // ── Elements ──
        const tabsContainer = document.getElementById('designTabs');
        const tabButtons = tabsContainer.querySelectorAll('.tab-button');
        const viewportFrame = document.getElementById('viewportFrame');
        const openNewTab = document.getElementById('openNewTab');
        const reloadFrame = document.getElementById('reloadFrame');

        // ── Load a design into the iframe ──
        function loadDesign(file) {
            if (!file) return;

            // Update iframe source
            viewportFrame.src = file;

            // Update "open in new tab" target
            openNewTab.href = file;

            // Update active tab state
            tabButtons.forEach(function (btn) {
                if (btn.dataset.file === file) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Update URL hash so the selection is shareable/refresh-safe
            if (window.location.hash.replace('#', '') !== file) {
                history.replaceState(null, '', '#' + file);
            }
        }

        // ── Tab click handling ──
        tabButtons.forEach(function (btn) {
            btn.addEventListener('click', function () {
                loadDesign(btn.dataset.file);
            });
        });

        // ── Reload current design ──
        reloadFrame.addEventListener('click', function () {
            const currentSrc = viewportFrame.getAttribute('src');
            if (currentSrc) {
                // Force a reload by resetting src
                viewportFrame.src = currentSrc;
            }
        });

        // ── Keyboard shortcuts: 1–4 to switch designs ──
        document.addEventListener('keydown', function (event) {
            // Ignore if user is typing inside the iframe or a form field
            if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') {
                return;
            }

            const keyIndex = parseInt(event.key, 10);
            if (!isNaN(keyIndex) && keyIndex >= 1 && keyIndex <= tabButtons.length) {
                const targetButton = tabButtons[keyIndex - 1];
                if (targetButton) {
                    loadDesign(targetButton.dataset.file);
                }
            }
        });

        // ── Restore from URL hash on load ──
        (function init() {
            const hashFile = window.location.hash.replace('#', '');
            const validFiles = Array.from(tabButtons).map(function (btn) {
                return btn.dataset.file;
            });

            if (hashFile && validFiles.indexOf(hashFile) !== -1) {
                loadDesign(hashFile);
            }
        })();
    </script>
</body>

</html>
